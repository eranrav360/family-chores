<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
  </defs>

  <!-- Purple gradient rounded-square background -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Roof -->
  <polygon points="256,108 416,292 96,292" fill="white"/>

  <!-- House body -->
  <rect x="126" y="284" width="260" height="182" fill="white"/>

  <!-- Arched door (purple) -->
  <path d="M220,466 L220,386 A36,36 0 0,0 292,386 L292,466 Z" fill="#7C3AED"/>

  <!-- Left window -->
  <rect x="150" y="312" width="58" height="52" rx="8" fill="#DDD6FE"/>
  <line x1="179" y1="312" x2="179" y2="364" stroke="#7C3AED" stroke-width="4"/>
  <line x1="150" y1="338" x2="208" y2="338" stroke="#7C3AED" stroke-width="4"/>

  <!-- Right window -->
  <rect x="304" y="312" width="58" height="52" rx="8" fill="#DDD6FE"/>
  <line x1="333" y1="312" x2="333" y2="364" stroke="#7C3AED" stroke-width="4"/>
  <line x1="304" y1="338" x2="362" y2="338" stroke="#7C3AED" stroke-width="4"/>

  <!-- Gold 5-pointed star at roof peak -->
  <g transform="translate(256,108)">
    <polygon
      points="0,-42  10.6,-14.6  40.0,-13.0  17.1,5.6  24.7,34.0  0,18  -24.7,34.0  -17.1,5.6  -40.0,-13.0  -10.6,-14.6"
      fill="#FCD34D"
      stroke="#F59E0B"
      stroke-width="2"
      stroke-linejoin="round"
    />
  </g>
</svg>
