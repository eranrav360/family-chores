name: Keep Render Server Alive

on:
  schedule:
    # Runs every 10 minutes — Render sleeps after 15 min of inactivity
    - cron: '*/10 * * * *'
  workflow_dispatch: # also allows manual trigger from GitHub UI

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          curl -fsS --max-time 60 https://family-chores-server.onrender.com/health \
            && echo "✅ Server is up" \
            || echo "⚠️ Server did not respond in time (cold start?)"
